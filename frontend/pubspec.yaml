name: frontend
description: "SmartRoomMS - Hệ thống quản lý phòng trọ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Image picker — THÊM MỚI để chọn/chụp ảnh avatar
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Calistoga
      fonts:
        - asset: assets/fonts/Calistoga-Regular.ttf

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 400
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 500
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 600
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 700
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Italic-VariableFont_wght.ttf
          style: italic